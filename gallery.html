<!DOCTYPE html>
<html lang="zh-TW" data-page="gallery">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>視覺敘事 | 日誌集</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Serif+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

<body>

  <div id="layout-canvas"></div>
  <div id="layout-header"></div>

  <section class="gallery-section container" id="gallery" style="padding-top: 20vh; min-height: 80vh;">
    <div class="section-header">
      <div>

    </div>

    <div class="gallery-grid">
      <div class="gallery-item item-1">

        <div class="gallery-overlay">
          <span class="gallery-caption">遼闊的感知</span>
        </div>
      </div>
      <div class="gallery-item item-2">
        <img src="圖片/截圖 2026-03-12 晚上10.39.04.jpeg" alt="Daily Capture" class="gallery-image">
        <div class="gallery-overlay">
          <span class="gallery-caption">城市的角落</span>
        </div>
      </div>
    </div>
  </section>

  <div id="layout-footer"></div>

  <script src="content/zh-TW.js"></script>
  <script src="components.js"></script>
  <script src="content/apply-page-content.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <script src="script.js"></script>
